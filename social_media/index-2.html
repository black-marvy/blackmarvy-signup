<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlackMarvy Media - Sign In</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
    }

    form {
      background-color: #fff;
      padding: 40px 30px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
      color: #333;
      font-size: 1.8rem;
    }

    p {
      margin-bottom: 25px;
      font-size: 0.9rem;
      color: #666;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: #302b63;
      box-shadow: 0 0 5px #302b63;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: #302b63;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #5046a3;
    }

    .signup {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #555;
    }

    .signup a {
      color: #302b63;
      text-decoration: none;
      font-weight: bold;
    }

    .signup a:hover {
      text-decoration: underline;
    }

    @media screen and (max-width: 420px) {
      form {
        width: 90%;
        padding: 30px 20px;
      }
    }

  </style>
</head>
<body>
  <form onsubmit="login(); return false;">
    <h2>BlackMarvy Media</h2>
    <p>Please sign in to your account</p>

    <input type="text" class="username" placeholder="Enter username" required />
    <input type="password" class="password" placeholder="Enter password" required />

    <button type="submit" class="btn">Sign In</button>

    <div class="signup">
      <p>Don't have an account? <a href="index.html">Sign Up</a></p>
    </div>
  </form>

  <script>
    function login() {
      let storedUser = localStorage.getItem("username");
      let storedPass = localStorage.getItem("password");

      let inputUser = document.querySelector(".username").value;
      let inputPass = document.querySelector(".password").value;

      if(storedUser === inputUser && storedPass === inputPass){
        alert("Successful login!");
      } else {
        alert("Incorrect username or password");
      }
    }
  </script>
</body>
</html>
